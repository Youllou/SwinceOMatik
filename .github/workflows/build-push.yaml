name: Call reusable docker build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:


permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    uses: youllou/workflows/.github/workflows/build-push-ghcr.yaml@main
    with:
      container-name: swinceomatik
      context: .
      file: Dockerfile
      branch: main
    secrets:
      GHCR_DEPLOY_TOKEN: ${{ secrets.GHCR_DEPLOY_TOKEN }}
